# IBN-5100 Terminal — Docker Compose 定義
# 兩個 service：web（production，nginx:alpine）、web-test（測試，node:20-alpine）。
# 詳見 openspec/changes/add-ibn5100-terminal/design.md Decision 5。

services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ibn5100-terminal-web:latest
    container_name: ibn5100-terminal-web
    ports:
      - "8080:80"
    volumes:
      - ../logs:/var/log/nginx
    restart: unless-stopped

  web-test:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ..:/app
      - ibn5100_node_modules:/app/node_modules
    # 預設指令；實際使用透過 `docker compose run --rm web-test ...` 覆寫。
    # 使用具名 volume 保存 node_modules，避免每次 `run --rm` 後消失。
    command: sh -c "npm test"

volumes:
  ibn5100_node_modules: {}
